<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>corn.lol</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #080808;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #main-content {
            display: none;
            width: 90%;
            max-width: 1000px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            font-size: 2rem;
        }

        /* --- CATEGORY TILES (Smaller) --- */
        .category-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .cat-card {
            width: 150px; /* Small Tiles */
            height: 150px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #222;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
        }

        .cat-card:hover {
            transform: scale(1.1);
            border-color: #00ffcc;
        }

        .cat-card span {
            position: relative;
            z-index: 2;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* --- GALLERY & VIDEO LISTS --- */
        .view-section {
            display: none;
        }

        .back-btn {
            background: #222;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 10px 20px;
            cursor: pointer;
            margin-bottom: 30px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* Video Tiles in the list */
        .video-tile {
            height: 150px;
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .video-tile:hover {
            border-color: #ff0055;
            background: #1a1a1a;
        }

        .video-tile i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* --- PLAYER --- */
        #player-container {
            display: none;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: 2px solid #333;
            border-radius: 10px;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }

        #lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>CPHAVEN</h1>
        
        <!-- Main Tiles -->
        <div id="category-screen" class="category-selector">
            <div class="cat-card" onclick="openGallery('cem')">
                <span>cp</span>
            </div>
            <div class="cat-card" onclick="openGallery('ai')">
                <span>AI Images</span>
            </div>
            <div class="cat-card" onclick="openVideoList()">
                <span>Videos</span>
            </div>
        </div>

        <!-- Image Gallery View -->
        <div id="gallery-screen" class="view-section">
            <button class="back-btn" onclick="showHome()">← Back</button>
            <h2 id="gallery-title" style="color: #00ffcc;"></h2>
            <div class="grid" id="image-grid"></div>
        </div>

        <!-- Video Selection View (The List) -->
        <div id="video-list-screen" class="view-section">
            <button class="back-btn" onclick="showHome()">← Back</button>
            <h2 style="color: #ff0055;">SELECT A VIDEO</h2>
            <div class="grid" id="video-grid">
                <!-- Video Tiles -->
                <div class="video-tile" onclick="openPlayer('15-0p5igV7_LX0Em4mQfcV7uViyAuBr2r')">
                    <span>▶</span>
                    <p>1.mp4</p>
                </div>
                <div class="video-tile" onclick="openPlayer('17hU-f4w7sheUAvZJhoag_qtr2ko8Z0qb')">
                    <span>▶</span>
                    <p>2.mp4</p>
                </div>
                <div class="video-tile" onclick="openPlayer('13hiYHvLxZIfiTJ1Uzmqbl_Md2FXkwiTx')">
                    <span>▶</span>
                    <p>3.mp4</p>
                </div>
            </div>
        </div>

        <!-- Video Player View -->
        <div id="player-screen" class="view-section">
            <button class="back-btn" onclick="openVideoList()">← Back to List</button>
            <div id="player-container">
                <iframe id="video-iframe" src="" allow="autoplay"></iframe>
            </div>
        </div>

    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="full-img" src="">
    </div>

    <script>
        const config = {
            cem: { prefix: "", count: 22, ext: ".png", title: "CEM GALLERY" },
            ai: { prefix: "ai", count: 50, ext: ".jpeg", title: "AI GENERATIONS" }
        };

        // 1. Password and Random Colors
        (function init() {
            const code = prompt("ENTER ACCESS CODE:");
            if (code === "cemmy") {
                document.getElementById('main-content').style.display = 'block';
                // Apply random colors to the tiles
                document.querySelectorAll('.cat-card').forEach(card => {
                    const randomHue = Math.floor(Math.random() * 360);
                    card.style.backgroundColor = `hsl(${randomHue}, 40%, 30%)`;
                });
            } else {
                alert("ACCESS DENIED");
                window.location.reload();
            }
        })();

        // 2. Image Gallery Logic
        function openGallery(cat) {
            hideAll();
            const grid = document.getElementById('image-grid');
            const data = config[cat];
            grid.innerHTML = "";
            document.getElementById('gallery-screen').style.display = 'block';
            document.getElementById('gallery-title').innerText = data.title;

            for (let i = 1; i <= data.count; i++) {
                const img = document.createElement('img');
                img.src = `${data.prefix}${i}${data.ext}`;
                img.style.width = "100%"; img.style.height = "150px"; img.style.objectFit = "cover";
                img.style.borderRadius = "8px"; img.style.cursor = "pointer";
                img.onclick = () => {
                    document.getElementById('full-img').src = img.src;
                    document.getElementById('lightbox').style.display = 'flex';
                };
                img.onerror = function() { this.remove(); };
                grid.appendChild(img);
            }
        }

        // 3. Video Logic
        function openVideoList() {
            hideAll();
            document.getElementById('video-list-screen').style.display = 'block';
        }

        function openPlayer(fileId) {
            if(fileId.includes('ID_FOR')) {
                alert("Please edit the HTML code and paste your Google Drive File IDs first!");
                return;
            }
            hideAll();
            document.getElementById('player-screen').style.display = 'block';
            document.getElementById('player-container').style.display = 'block';
            // Set the iframe source to the GDrive preview link
            document.getElementById('video-iframe').src = `https://drive.google.com/file/d/${fileId}/preview`;
        }

        // 4. Navigation Helpers
        function showHome() {
            hideAll();
            document.getElementById('category-screen').style.display = 'flex';
            document.getElementById('video-iframe').src = ""; // Stop video playback
        }

        function hideAll() {
            document.getElementById('category-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'none';
            document.getElementById('video-list-screen').style.display = 'none';
            document.getElementById('player-screen').style.display = 'none';
        }
    </script>

</body>
</html>
