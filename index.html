<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPHAVEN</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b0b0b;
            color: #eee;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #main-content {
            display: none;
            width: 90%;
            max-width: 1100px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: #00ffcc;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tabs {
            margin-bottom: 30px;
        }

        .tab-btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #00ffcc;
            color: #000;
            border-color: #00ffcc;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            background: #1a1a1a;
        }

        .grid img:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1>WELCOME TO CPHAVEN</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="loadCategory('cem')">CEM</button>
            <button class="tab-btn" onclick="loadCategory('ai')">AI</button>
        </div>

        <div class="grid" id="image-grid"></div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="full-img" src="" alt="Fullscreen view">
    </div>

    <script>
        const config = {
            cem: { prefix: "", count: 22 },
            ai: { prefix: "ai", count: 10 } 
        };

        (function init() {
            const code = prompt("ENTER ACCESS CODE:");
            if (code === "cemmy") {
                document.getElementById('main-content').style.display = 'block';
                loadCategory('cem');
            } else {
                alert("ACCESS DENIED");
                window.location.reload();
            }
        })();

        function loadCategory(cat) {
            const grid = document.getElementById('image-grid');
            const buttons = document.querySelectorAll('.tab-btn');
            grid.innerHTML = "";

            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === cat);
            });

            const data = config[cat];
            for (let i = 1; i <= data.count; i++) {
                const img = document.createElement('img');
                img.src = `${data.prefix}${i}.png`;
                img.onclick = () => openFullscreen(img.src);
                
                img.onerror = function() { this.style.display = 'none'; }; 
                
                grid.appendChild(img);
            }
        }

        function openFullscreen(src) {
            const lb = document.getElementById('lightbox');
            const fullImg = document.getElementById('full-img');
            fullImg.src = src;
            lb.style.display = 'flex';
        }
    </script>

</body>
</html>
